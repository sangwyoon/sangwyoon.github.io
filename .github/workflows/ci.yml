name: CI
on: [pull_request]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HTML smoke check
        run: |
          python3 - <<'PY'
          import pathlib, sys
          from html.parser import HTMLParser
          bad = []
          for f in pathlib.Path(".").rglob("*.html"):
              try:
                  HTMLParser().feed(f.read_text(encoding="utf-8", errors="replace"))
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print(f"HTML OK")
          PY
